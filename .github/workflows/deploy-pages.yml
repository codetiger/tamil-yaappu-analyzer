name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            wasm/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install esbuild
        run: npm install --no-save esbuild

      - name: Build WASM
        run: wasm-pack build wasm --target web --release --out-dir pkg

      - name: Assemble & minify site
        run: |
          mkdir -p _site/pkg _site/js _site/css

          # Bundle & minify JS (all app modules → single file)
          npx esbuild web/js/app.js --bundle --minify --format=esm \
            --external:../pkg/* --outfile=_site/js/app.js

          # Minify CSS
          npx esbuild web/css/colors.css --minify --outfile=_site/css/colors.css
          npx esbuild web/css/main.css --minify --outfile=_site/css/main.css

          # Minify WASM glue JS
          npx esbuild wasm/pkg/tamil_yaappu_wasm.js --minify --outfile=_site/pkg/tamil_yaappu_wasm.js

          # Copy WASM binary and HTML as-is
          cp wasm/pkg/tamil_yaappu_wasm_bg.wasm _site/pkg/
          cp web/index.html _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
