<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamil Yaappu Analyzer — தமிழ் யாப்பிலக்கண பகுப்பாய்வி</title>
  <link rel="stylesheet" href="css/colors.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-title">
      <h1>Tamil Yaappu Analyzer</h1>
      <span class="subtitle">தமிழ் யாப்பிலக்கண பகுப்பாய்வி</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Input -->
    <section class="input-zone">
      <div class="input-row">
        <textarea
          id="input-text"
          class="input-textarea"
          placeholder="Enter Tamil verse here / தமிழ் பாடலை இங்கே உள்ளிடவும்..."
          rows="3"
        ></textarea>
        <div class="input-controls">
          <button id="btn-analyze" class="btn-analyze" disabled>Analyze</button>
          <select id="sample-select" class="sample-select">
            <option value="" disabled selected>Load Sample...</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Loading -->
    <div id="loading-bar" class="loading-bar" style="display: none;">
      <span class="spinner"></span> Loading analysis engine...
    </div>

    <!-- Ornamentation Summary -->
    <section id="validation-zone" class="validation-zone"></section>

    <!-- Analysis Output: Verse + Detail side-by-side on desktop -->
    <div id="analysis-output" class="analysis-output">
      <div class="verse-panel">
        <section id="verse-zone" class="verse-zone"></section>
      </div>
      <aside id="detail-zone" class="detail-zone"></aside>
    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <a href="https://github.com/codetiger/tamil-yaappu-analyzer"
         target="_blank" rel="noopener noreferrer" class="footer-link">
        <svg class="footer-icon" viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
      <span class="footer-separator">&middot;</span>
      <a href="https://github.com/codetiger/tamil-yaappu-analyzer/issues/new"
         target="_blank" rel="noopener noreferrer" class="footer-link">
        Report an Issue
      </a>
    </div>
  </footer>

  <!-- Backdrop overlay for mobile bottom sheet -->
  <div id="detail-backdrop" class="backdrop"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
