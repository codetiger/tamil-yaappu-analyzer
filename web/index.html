<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamil Yaappu Analyzer — தமிழ் யாப்பிலக்கண பகுப்பாய்வி</title>
  <link rel="stylesheet" href="css/colors.css?v=3">
  <link rel="stylesheet" href="css/main.css?v=3">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>

  <!-- Title Bar -->
  <header class="titlebar">
    <h1 class="titlebar-title">தமிழ் யாப்பிலக்கண பகுப்பாய்வி</h1>
    <div class="titlebar-controls">
      <button id="btn-share" class="titlebar-btn btn-share" disabled title="Copy shareable link">
        <svg class="icon-link" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span>Share</span>
      </button>
      <a href="https://github.com/codetiger/tamil-yaappu-analyzer"
         target="_blank" rel="noopener noreferrer" class="titlebar-btn" title="GitHub Repository">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
      <button id="btn-theme-toggle" class="titlebar-btn btn-theme-toggle" title="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Input Bar -->
  <section id="input-section" class="input-section">
    <div class="input-bar">
      <textarea
        id="input-text"
        class="input-textarea"
        placeholder="Enter Tamil verse here / தமிழ் பாடலை இங்கே உள்ளிடவும்..."
        rows="3"
      ></textarea>
      <div class="input-controls">
        <button id="btn-analyze" class="btn-analyze" disabled>Analyze</button>
        <select id="sample-select" class="sample-select">
          <option value="" disabled selected>Load Sample...</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Loading -->
  <div id="loading-bar" class="loading-bar" style="display: none;">
    <span class="spinner"></span> Loading analysis engine...
  </div>

  <!-- Poem Header: Classification + Poem-level Tags -->
  <section id="poem-header" class="poem-header"></section>

  <!-- Poem Body: Line Rows with Word Boxes -->
  <section id="poem-body" class="poem-body"></section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <a href="https://github.com/codetiger/tamil-yaappu-analyzer/issues/new"
         target="_blank" rel="noopener noreferrer" class="footer-link">
        Report an Issue
      </a>
    </div>
  </footer>

  <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
